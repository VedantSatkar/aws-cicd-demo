<!DOCTYPE html>
<html>
<head>
<title>AWS CI/CD Student Portal system 360 </title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
margin-top:50px;
}

button{
background:orange;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
border-radius:5px;
}

#students{
margin-top:30px;
}

.card{
background:white;
width:350px;
margin:15px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<h1>AWS CI/CD Student Portal</h1>

<button onclick="loadStudents()">
Load Student Data
</button>

<div id="students"></div>

<script>

async function loadStudents(){

const container=document.getElementById("students");

container.innerHTML="Loading...";

try{

const response=await fetch(
"https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/data"
);

const data=await response.json();

container.innerHTML="";

data.forEach(student=>{

container.innerHTML+=`
<div class="card">
<h2>${student.name}</h2>
<p>ID: ${student.id}</p>
<p>Course: ${student.course}</p>
</div>
`;

});

}catch(error){

container.innerHTML="<h2>Error Loading Data</h2>";

}

}

</script>

</body>
</html>
