<!DOCTYPE html>
<html>
<head>
<title>AWS CI/CD Student Portal 360</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    text-align:center;
}

h1{
    margin-top:40px;
}

.container{
    width:500px;
    margin:auto;
}

input{
    width:280px;
    padding:12px;
    margin:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:orange;
    color:white;
    border:none;
    padding:15px 25px;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
    margin:5px;
}

button:hover{
    background:#ff8c00;
}

.card{
    background:white;
    width:350px;
    margin:15px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#students{
    margin-top:30px;
}
</style>
</head>

<body>

<h1>AWS CI/CD Student Portal 360</h1>

<div class="container">

<h2>Add Student</h2>

<input type="text" id="id" placeholder="Student ID"><br>

<input type="text" id="name" placeholder="Student Name"><br>

<input type="text" id="course" placeholder="Course"><br>

<button onclick="addStudent()">Add Student</button>

<button onclick="loadStudents()">Load Student Data</button>

</div>

<div id="students"></div>

<script>

const GET_API =
"https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/data";

const POST_API =
"https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/addstudents";


async function loadStudents(){

    const container =
    document.getElementById("students");

    container.innerHTML = "<h3>Loading...</h3>";

    try{

        const response =
        await fetch(GET_API);

        const data =
        await response.json();

        container.innerHTML = "";

        data.forEach(student => {

            container.innerHTML += `
            <div class="card">
                <h2>${student.name}</h2>
                <p><b>ID:</b> ${student.id}</p>
                <p><b>Course:</b> ${student.course}</p>
            </div>
            `;
        });

    }
    catch(error){

        container.innerHTML =
        "<h2>Error Loading Data</h2>";

        console.log(error);
    }
}


async function addStudent(){

    const id =
    document.getElementById("id").value;

    const name =
    document.getElementById("name").value;

    const course =
    document.getElementById("course").value;

    if(!id || !name || !course){

        alert("Please fill all fields");
        return;
    }

    try{

        const response =
        await fetch(POST_API,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                id:id,
                name:name,
                course:course
            })

        });

        const result =
        await response.json();

        console.log(result);

        alert("Student Added Successfully");

        document.getElementById("id").value="";
        document.getElementById("name").value="";
        document.getElementById("course").value="";

        loadStudents();

    }
    catch(error){

        console.log(error);

        alert("Failed To Add Student");
    }
}

loadStudents();

</script>

</body>
</html>
