<!DOCTYPE html>
<html>
<head>
    <title>AWS CI/CD Student Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
        }

        button{
            padding:12px 20px;
            font-size:18px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <h1>AWS CI/CD Student Portal</h1>

    <button onclick="loadStudent()">
        Load Student Data
    </button>

    <div id="result"></div>

    <script>
        async function loadStudent(){

            try{

                const response = await fetch(
                    "https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/data"
                );

                const data = await response.json();

                document.getElementById("result").innerHTML =
                    "ID: " + data.id +
                    "<br>Name: " + data.name +
                    "<br>Course: " + data.course;

            }catch(error){

                document.getElementById("result").innerHTML =
                    "Error loading data";

                console.error(error);
            }
        }
    </script>

</body>
</html>
