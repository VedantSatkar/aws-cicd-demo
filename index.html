<!DOCTYPE html>
<html>

<head>

    <title>AWS Serverless Student Portal 360</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:60px;
            background:#f5f5f5;
        }

        h1{
            color:#232f3e;
        }

        button{
            padding:15px 25px;
            font-size:18px;
            cursor:pointer;
            background:#ff9900;
            border:none;
            border-radius:5px;
        }

        button:hover{
            background:#e68a00;
        }

        #result{
            margin-top:30px;
            font-size:24px;
            font-weight:bold;
        }

        .card{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            margin-top:30px;
        }

    </style>

</head>

<body>

    <h1>AWS CI/CD Student Portal</h1>

    <button onclick="loadStudent()">
        Load Student Data
    </button>

    <div id="result"></div>

<script>

async function loadStudent(){

    try{

        const response = await fetch(
            "https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/data"
        );

        const data = await response.json();

        document.getElementById("result").innerHTML = `

        <div class="card">

        <p>ID: ${data.id}</p>

        <p>Name: ${data.name}</p>

        <p>Course: ${data.course}</p>

        </div>

        `;

    }

    catch(error){

        document.getElementById("result").innerHTML =
        "Error Loading Data";

    }

}

</script>

</body>

</html>
