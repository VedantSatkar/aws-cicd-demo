<!DOCTYPE html>
<html>

<head>

    <title>AWS Serverless Student Portal</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            padding:30px;
        }

        h1{
            color:#232f3e;
        }

        button{
            background:#ff9900;
            color:white;
            border:none;
            padding:15px 25px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
            margin-bottom:20px;
        }

        button:hover{
            opacity:0.9;
        }

        .card{
            width:350px;
            background:white;
            margin:15px auto;
            padding:15px;
            border-radius:10px;
            box-shadow:0px 2px 8px rgba(0,0,0,0.2);
        }

        .student-name{
            font-size:22px;
            font-weight:bold;
        }

        .course{
            color:#555;
        }

    </style>

</head>

<body>

    <h1>AWS CI/CD Student Portal</h1>

    <button onclick="loadStudents()">
        Load Student Data
    </button>

    <div id="result"></div>

<script>

async function loadStudents(){

    try{

        const response = await fetch(
        "https://qmr6oisu79.execute-api.ap-south-1.amazonaws.com/pord/data"
        );

        const students = await response.json();

        let html = "";

        students.forEach(student => {

            html += `
            <div class="card">

                <div class="student-name">
                    ${student.name}
                </div>

                <p>ID: ${student.id}</p>

                <p class="course">
                    Course: ${student.course}
                </p>

            </div>
            `;
        });

        document.getElementById("result").innerHTML = html;

    }
    catch(error){

        document.getElementById("result").innerHTML =
        "<h2>Error Loading Data</h2>";

        console.error(error);
    }
}

</script>

</body>

</html>
